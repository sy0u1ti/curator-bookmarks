<!doctype html>
<html lang="zh-CN" class="loading-wallpaper newtab-booting">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator 新标签页</title>
    <style id="instant-wallpaper-startup-style">
      :root {
        color-scheme: dark;
        --bg: #101013;
        --wallpaper-placeholder-bg: #101013;
        --instant-wallpaper-preview-blur: 18px;
        --instant-wallpaper-preview-loading-blur: 22px;
        --instant-wallpaper-preview-loading-opacity: 0.54;
        --instant-wallpaper-preview-loading-scale: 1.06;
        --instant-wallpaper-preview-opacity: 0.68;
        --instant-wallpaper-preview-scale: 1.045;
        background-color: #101013;
      }

      html,
      body {
        width: 100%;
        min-width: 0;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--wallpaper-placeholder-bg, #101013);
      }

      body {
        background-image: var(--instant-wallpaper-image, none);
        background-position: var(--instant-wallpaper-position, center);
        background-repeat: no-repeat;
        background-size: var(--instant-wallpaper-size, cover);
      }

      body::before {
        content: "";
        position: fixed;
        inset: -56px;
        z-index: 0;
        background-color: var(--wallpaper-placeholder-bg, #101013);
        background-image: var(--instant-wallpaper-preview-image, none);
        background-position: var(--instant-wallpaper-position, center);
        background-repeat: no-repeat;
        background-size: var(--instant-wallpaper-size, cover);
        filter: blur(var(--instant-wallpaper-preview-blur, 18px)) saturate(1.04) brightness(0.9);
        opacity: var(--instant-wallpaper-preview-opacity, 0.68);
        pointer-events: none;
        transform: scale(var(--instant-wallpaper-preview-scale, 1.045));
        transform-origin: center;
        transition:
          opacity 320ms cubic-bezier(0.22, 1, 0.36, 1),
          filter 400ms ease-in-out,
          transform 420ms cubic-bezier(0.22, 1, 0.36, 1);
        will-change: opacity, filter, transform;
      }

      html.loading-wallpaper:not(.instant-wallpaper-ready) body::before {
        filter: blur(var(--instant-wallpaper-preview-loading-blur, 22px)) saturate(1.02) brightness(0.82);
        opacity: var(--instant-wallpaper-preview-loading-opacity, 0.54);
        transform: scale(var(--instant-wallpaper-preview-loading-scale, 1.06));
      }

      html.instant-wallpaper-remote-ready:not([data-instant-wallpaper-preview-only="true"]) body::before {
        filter: blur(10px) saturate(1) brightness(0.92);
        opacity: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        body::before {
          transition: none;
        }
      }
    </style>
    <script defer src="/instant-wallpaper-boot.js"></script>
  </head>
  <body>
    <div id="newtab-react-root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
