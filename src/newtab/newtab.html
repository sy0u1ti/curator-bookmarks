<!doctype html>
<html lang="zh-CN" class="loading-wallpaper newtab-booting">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator 新标签页</title>
    <style id="instant-wallpaper-startup-style">
      :root {
        color-scheme: dark;
        --bg: #101013;
        --newtab-font-sans: "Geist", "Geist Sans", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI Variable Text", "Segoe UI", system-ui, "PingFang SC", "Microsoft YaHei UI", "Microsoft YaHei", "Hiragino Sans GB", "Helvetica Neue", Arial, sans-serif;
        --wallpaper-placeholder-bg: #101013;
        --instant-wallpaper-preview-blur: 0px;
        --instant-wallpaper-preview-loading-blur: 0px;
        --instant-wallpaper-preview-loading-opacity: 1;
        --instant-wallpaper-preview-opacity: 1;
        background-color: #101013;
        font-family: var(--newtab-font-sans);
        font-optical-sizing: auto;
        font-synthesis: none;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      html,
      body {
        width: 100%;
        min-width: 0;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--wallpaper-placeholder-bg, #101013);
        background-image: var(--instant-wallpaper-image, none), var(--instant-wallpaper-preview-image, none);
        background-position: var(--instant-wallpaper-position, center);
        background-repeat: no-repeat;
        background-size: var(--instant-wallpaper-size, cover);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-color: transparent;
        background-image: var(--instant-wallpaper-image, none), var(--instant-wallpaper-preview-image, none);
        background-position: var(--instant-wallpaper-position, center);
        background-repeat: no-repeat;
        background-size: var(--instant-wallpaper-size, cover);
        filter: none;
        opacity: var(--instant-wallpaper-preview-opacity, 1);
        pointer-events: none;
        transition: opacity 280ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      html.loading-wallpaper body::before,
      html:not([data-instant-wallpaper-preview-only="true"]).instant-wallpaper-ready:not(.instant-wallpaper-remote-ready) body::before {
        will-change: opacity;
      }

      html.loading-wallpaper:not(.instant-wallpaper-ready) body::before {
        filter: none;
        opacity: var(--instant-wallpaper-preview-loading-opacity, 1);
      }

      html.instant-wallpaper-remote-ready:not([data-instant-wallpaper-preview-only="true"]) body::before {
        opacity: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        body::before {
          transition: none;
          will-change: auto;
        }
      }
    </style>
    <style id="newtab-startup-background-mask-style">
      #newtab-startup-background-mask {
        position: fixed;
        inset: 0;
        z-index: 1;
        background-color: var(--instant-wallpaper-mask-color, transparent);
        background-image: var(--instant-wallpaper-mask-image, none);
        -webkit-backdrop-filter: var(--instant-wallpaper-mask-filter, none);
        backdrop-filter: var(--instant-wallpaper-mask-filter, none);
        pointer-events: none;
      }

      html[data-instant-wallpaper-mask="false"] #newtab-startup-background-mask {
        display: none;
      }

      @media (prefers-reduced-transparency: reduce) {
        #newtab-startup-background-mask {
          -webkit-backdrop-filter: none;
          backdrop-filter: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="newtab-startup-background-mask" aria-hidden="true"></div>
    <div id="newtab-react-root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
