<!doctype html>
<html lang="zh-CN" class="loading-wallpaper newtab-booting">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator 新标签页</title>
    <style id="instant-wallpaper-startup-style">
      :root {
        color-scheme: dark;
        --bg: #101013;
        --wallpaper-placeholder-bg: #101013;
        background-color: #101013;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--wallpaper-placeholder-bg, #101013);
      }

      body {
        background-image: var(--instant-wallpaper-image, none);
        background-position: var(--instant-wallpaper-position, center);
        background-repeat: no-repeat;
        background-size: var(--instant-wallpaper-size, cover);
      }

      body::before {
        content: "";
        position: fixed;
        inset: -24px;
        z-index: 0;
        background-color: var(--wallpaper-placeholder-bg, #101013);
        background-image: var(--instant-wallpaper-preview-image, none);
        background-position: var(--instant-wallpaper-position, center);
        background-repeat: no-repeat;
        background-size: var(--instant-wallpaper-size, cover);
        opacity: 0.82;
        pointer-events: none;
        transform: scale(1.02);
      }
    </style>
    <script defer src="/instant-wallpaper-boot.js"></script>
  </head>
  <body>
    <div id="newtab-react-root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
