<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator 新标签页</title>
    <link rel="stylesheet" href="./newtab.css">
  </head>
  <body>
    <div id="newtab-background-mask" class="newtab-background-mask" aria-hidden="true"></div>

    <div class="settings-trigger-zone">
      <button
        id="newtab-settings-trigger"
        class="settings-trigger"
        type="button"
        aria-label="打开设置"
        aria-controls="newtab-settings-drawer"
        aria-expanded="false"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M12 8.2a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6Z"></path>
          <path d="M19.4 13.4c.1-.5.1-.9.1-1.4s0-.9-.1-1.4l2-1.5-1.9-3.2-2.4 1a8.5 8.5 0 0 0-2.4-1.4L14.4 3h-4.8l-.4 2.5c-.9.3-1.7.8-2.4 1.4l-2.3-1-1.9 3.2 2 1.5c-.1.5-.1.9-.1 1.4s0 .9.1 1.4l-2 1.5 1.9 3.2 2.3-1c.7.6 1.5 1.1 2.4 1.4l.4 2.5h4.8l.4-2.5c.9-.3 1.7-.8 2.4-1.4l2.4 1 1.9-3.2-2.1-1.5Z"></path>
        </svg>
      </button>
    </div>

    <div id="newtab-settings-backdrop" class="settings-backdrop" data-close-settings></div>
    <aside
      id="newtab-settings-drawer"
      class="settings-drawer"
      role="dialog"
      aria-modal="true"
      aria-labelledby="newtab-settings-title"
      aria-describedby="newtab-settings-summary"
      aria-hidden="true"
      tabindex="-1"
    >
      <button id="newtab-settings-close" class="settings-close" type="button" aria-label="关闭设置">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="m6.5 6.5 11 11M17.5 6.5l-11 11"></path>
        </svg>
      </button>

      <div class="settings-drawer-scroll">
        <header class="settings-drawer-header">
          <p class="settings-drawer-kicker">New Tab</p>
          <h1 id="newtab-settings-title">新标签页设置</h1>
          <p id="newtab-settings-summary" class="settings-drawer-summary">书签来源、背景、图标布局、时间与搜索栏。</p>
        </header>

        <section class="settings-section" aria-labelledby="settings-general-title">
          <h2 id="settings-general-title">通用</h2>
          <div class="settings-card">
            <label class="setting-row">
              <span class="setting-label-stack">
                <span>隐藏设置图标</span>
                <small>桌面端移到右上角时显示，触屏设备始终显示。</small>
              </span>
              <input id="general-hide-settings-trigger" class="setting-switch-input" type="checkbox">
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <label class="setting-row">
              <span class="setting-label-stack">
                <span>显示常用</span>
                <small>优先展示打开次数较多或已固定的书签。</small>
              </span>
              <input id="general-show-frequent" class="setting-switch-input" type="checkbox" checked>
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <label class="setting-row">
              <span class="setting-label-stack">
                <span>显示最近</span>
                <small>展示最近打开或最近添加的书签。</small>
              </span>
              <input id="general-show-recent" class="setting-switch-input" type="checkbox" checked>
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="settings-folder-title">
          <h2 id="settings-folder-title">书签来源</h2>
          <div class="settings-card">
            <label class="setting-row">
              <span class="setting-label-stack">
                <span>隐藏文件夹名</span>
                <small>只保留图标网格，适合单一来源或极简布局。</small>
              </span>
              <input id="folder-hide-names" class="setting-switch-input" type="checkbox">
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <div class="folder-source-panel">
              <div class="folder-source-summary">
                <span>已选文件夹</span>
                <strong id="folder-selected-count">0</strong>
              </div>
              <div id="folder-selected-list" class="folder-selected-list"></div>
              <button
                id="folder-candidates-toggle"
                class="folder-candidates-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="folder-candidates-panel"
              >
                <span data-folder-toggle-label>展开候选文件夹</span>
                <span class="folder-candidates-chevron" aria-hidden="true"></span>
              </button>
              <div id="folder-candidates-panel" class="folder-candidates-panel" hidden>
                <div class="reveal-panel-body">
                  <label class="setting-floating-field folder-search-field">
                    <input
                      id="folder-candidate-search"
                      class="setting-text-input"
                      type="search"
                      placeholder="搜索文件夹"
                      spellcheck="false"
                    >
                  </label>
                  <div
                    id="folder-candidate-list"
                    class="folder-candidate-list"
                    role="listbox"
                    aria-multiselectable="true"
                  ></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="settings-background-title">
          <h2 id="settings-background-title">背景</h2>
          <div class="settings-card">
            <div class="setting-row">
              <span class="setting-label-stack">
                <span>背景类型</span>
                <small>可选择纯色、本地图片/视频或远程图片链接。</small>
              </span>
              <select id="background-type" class="setting-select setting-native-select">
                <option value="image">图片</option>
                <option value="video">视频</option>
                <option value="urls">图片链接</option>
                <option value="color" selected>纯色</option>
              </select>
            </div>
            <label id="background-color-row" class="setting-row">
              <span>背景颜色</span>
              <span id="background-color-control" class="setting-color">
                <span id="background-color-value">#000000</span>
                <input
                  id="background-color"
                  class="setting-color-input"
                  type="color"
                  value="#000000"
                  aria-label="背景颜色"
                >
              </span>
            </label>
            <div id="background-image-row" class="setting-row" hidden>
              <span>背景图片</span>
              <button id="background-image-picker" class="setting-file-button" type="button">选择图片</button>
              <input id="background-image-file" class="setting-file-input" type="file" accept="image/*">
            </div>
            <div id="background-video-row" class="setting-row" hidden>
              <span>背景视频</span>
              <button id="background-video-picker" class="setting-file-button" type="button">选择视频</button>
              <input id="background-video-file" class="setting-file-input" type="file" accept="video/*">
            </div>
            <div id="background-url-row" class="setting-row" hidden>
              <span>图片链接</span>
              <span class="setting-floating-field">
                <input
                  id="background-url"
                  class="setting-url-input"
                  type="url"
                  placeholder="图片链接"
                  spellcheck="false"
                >
              </span>
            </div>
            <div id="background-url-cache-row" class="setting-row" hidden>
              <span>图片缓存</span>
              <span class="setting-cache-control">
                <button id="background-url-cache-button" class="setting-file-button" type="button">授权并缓存</button>
                <span id="background-url-cache-status" class="setting-cache-status"></span>
              </span>
            </div>
            <div id="background-status" class="setting-status" role="status" aria-live="polite" hidden></div>
            <label class="setting-row">
              <span class="setting-label-stack">
                <span>背景蒙版</span>
                <small>提升复杂背景上的图标和文字可读性。</small>
              </span>
              <input id="background-mask-enabled" class="setting-switch-input" type="checkbox">
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <div id="background-mask-style-row" class="setting-row" hidden>
              <span>模糊样式</span>
              <select id="background-mask-style" class="setting-select setting-native-select">
                <option value="dark">暗色增强</option>
                <option value="frosted">磨砂柔化</option>
                <option value="light">亮色柔化</option>
              </select>
            </div>
            <label id="background-mask-blur-row" class="setting-row slider-row" hidden>
              <span>模糊程度 <output id="background-mask-blur-value" class="setting-value">12px</output></span>
              <input id="background-mask-blur" class="setting-range" type="range" min="0" max="32" value="12">
            </label>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="settings-icon-title">
          <h2 id="settings-icon-title">图标</h2>
          <div class="settings-card icon-settings-card">
            <div class="icon-live-preview-panel">
              <div class="icon-live-preview-header">
                <span>实时预览</span>
                <span id="icon-live-preview-summary" class="icon-live-preview-summary"></span>
              </div>
              <div id="icon-live-preview" class="icon-live-preview" role="img" aria-label="图标布局预览"></div>
            </div>
            <div id="icon-preset-row" class="icon-preset-row"></div>
            <div class="setting-row icon-control-row">
              <span class="setting-label-stack">
                <span>布局方式</span>
                <small>自动适配屏幕宽度；固定列数会在窄屏收缩。</small>
              </span>
              <div id="icon-layout-control" class="setting-segmented" role="group" aria-label="布局方式">
                <button class="setting-segmented-button" type="button" data-icon-layout-mode="auto">自动适配</button>
                <button class="setting-segmented-button" type="button" data-icon-layout-mode="fixed">固定列数</button>
              </div>
            </div>
            <label class="setting-row">
              <span class="setting-label-stack">
                <span>垂直居中</span>
                <small>书签较少时让主内容贴近屏幕中部。</small>
              </span>
              <input id="icon-vertical-center" class="setting-switch-input" type="checkbox">
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <label class="setting-row">
              <span class="setting-label-stack">
                <span>显示标题</span>
                <small>关闭后只显示网站图标。</small>
              </span>
              <input id="icon-show-titles" class="setting-switch-input" type="checkbox" checked>
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <div id="icon-title-lines-row" class="setting-row icon-control-row">
              <span>标题行数</span>
              <div id="icon-title-lines-control" class="setting-segmented" role="group" aria-label="标题行数">
                <button class="setting-segmented-button" type="button" data-icon-title-lines="1">1 行</button>
                <button class="setting-segmented-button" type="button" data-icon-title-lines="2">2 行</button>
              </div>
            </div>
            <button
              id="icon-advanced-toggle"
              class="icon-advanced-toggle"
              type="button"
              aria-expanded="false"
              aria-controls="icon-advanced-panel"
            >
              <span>高级调整</span>
              <span class="icon-advanced-chevron" aria-hidden="true"></span>
            </button>
            <div id="icon-advanced-panel" class="icon-advanced-panel" hidden>
              <div class="reveal-panel-body">
                <label class="setting-row slider-row">
                  <span>页面宽度 <output id="icon-page-width-value" class="setting-value">64%</output></span>
                  <input id="icon-page-width" class="setting-range" type="range" min="16" max="100" value="64">
                </label>
                <label class="setting-row slider-row">
                  <span>图标大小 <output id="icon-shell-size-value" class="setting-value">44px</output></span>
                  <input id="icon-shell-size" class="setting-range" type="range" min="28" max="72" value="44">
                </label>
                <label class="setting-row slider-row">
                  <span>横向间距 <output id="icon-column-gap-value" class="setting-value">32px</output></span>
                  <input id="icon-column-gap" class="setting-range" type="range" min="0" max="100" value="18">
                </label>
                <label class="setting-row slider-row">
                  <span>行距 <output id="icon-row-gap-value" class="setting-value">20px</output></span>
                  <input id="icon-row-gap" class="setting-range" type="range" min="0" max="100" value="18">
                </label>
                <label class="setting-row slider-row">
                  <span>文件夹间距 <output id="icon-folder-gap-value" class="setting-value">22px</output></span>
                  <input id="icon-folder-gap" class="setting-range" type="range" min="0" max="120" value="22">
                </label>
                <label id="icon-columns-row" class="setting-row slider-row">
                  <span>固定列数 <output id="icon-columns-value" class="setting-value">6</output></span>
                  <input id="icon-columns" class="setting-range" type="range" min="3" max="12" value="6">
                </label>
              </div>
            </div>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="settings-time-title">
          <h2 id="settings-time-title">时间和日期</h2>
          <div class="settings-card">
            <label class="setting-row">
              <span>启用</span>
              <input id="time-enabled" class="setting-switch-input" type="checkbox" checked>
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <label class="setting-row">
              <span>显示秒</span>
              <input id="time-show-seconds" class="setting-switch-input" type="checkbox">
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <label class="setting-row">
              <span>12 小时制</span>
              <input id="time-hour12" class="setting-switch-input" type="checkbox">
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <div class="setting-row">
              <span>日期格式</span>
              <select id="time-date-format" class="setting-select setting-native-select">
                <option value="year-month-day-weekday">2026.05.01 周五</option>
                <option value="month-day-weekday">05.01 周五</option>
                <option value="weekday-month-day">周五 05/01</option>
                <option value="weekday-day-month">周五 01/05</option>
              </select>
            </div>
            <label class="setting-row slider-row">
              <span>时钟大小 <output id="time-clock-size-value" class="setting-value">100%</output></span>
              <input id="time-clock-size" class="setting-range" type="range" min="70" max="130" value="100">
            </label>
            <div class="setting-row">
              <span>时区</span>
              <select id="time-time-zone" class="setting-select setting-native-select">
                <option value="auto">自动设置</option>
                <option value="Asia/Shanghai">北京</option>
                <option value="Asia/Tokyo">东京</option>
                <option value="Asia/Singapore">新加坡</option>
                <option value="Europe/London">伦敦</option>
                <option value="Europe/Paris">巴黎</option>
                <option value="America/New_York">纽约</option>
                <option value="America/Los_Angeles">洛杉矶</option>
              </select>
            </div>
            <div class="setting-row">
              <span>显示</span>
              <select id="time-display-mode" class="setting-select setting-native-select">
                <option value="time-date">时钟和日期</option>
                <option value="time">仅时钟</option>
                <option value="date">仅日期</option>
              </select>
            </div>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="settings-search-title">
          <h2 id="settings-search-title">搜索栏</h2>
          <div class="settings-card">
            <label class="setting-row">
              <span class="setting-label-stack">
                <span>启用</span>
                <small>在新标签页顶部搜索书签，也可直接搜索网页。</small>
              </span>
              <input id="search-enabled" class="setting-switch-input" type="checkbox" checked>
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <label class="setting-row">
              <span class="setting-label-stack">
                <span>在新标签页打开链接</span>
                <small>保留当前 Curator 新标签页。</small>
              </span>
              <input id="search-open-new-tab" class="setting-switch-input" type="checkbox">
              <span class="setting-switch" aria-hidden="true"></span>
            </label>
            <div class="setting-row">
              <span class="setting-label-stack">
                <span>搜索引擎</span>
                <small>输入内容不是网址时使用此引擎。</small>
              </span>
              <select id="search-engine" class="setting-select setting-native-select">
                <option value="default">默认</option>
                <option value="google">Google</option>
                <option value="bing">Bing</option>
                <option value="baidu">百度</option>
                <option value="duckduckgo">DuckDuckGo</option>
              </select>
            </div>
            <div class="setting-row">
              <span>占位符文本</span>
              <span class="setting-floating-field">
                <input id="search-placeholder" class="setting-text-input" type="text" placeholder="占位符文本" maxlength="40">
              </span>
            </div>
            <label class="setting-row slider-row">
              <span>宽度 <output id="search-width-value" class="setting-value">44vw</output></span>
              <input id="search-width" class="setting-range" type="range" min="16" max="72" value="44">
            </label>
            <label class="setting-row slider-row">
              <span>高度 <output id="search-height-value" class="setting-value">34px</output></span>
              <input id="search-height" class="setting-range" type="range" min="28" max="56" value="34">
            </label>
            <label class="setting-row slider-row">
              <span>上下位置 <output id="search-offset-y-value" class="setting-value">0px</output></span>
              <input id="search-offset-y" class="setting-range" type="range" min="-32" max="72" value="0">
            </label>
            <label class="setting-row slider-row">
              <span>背景 <output id="search-background-value" class="setting-value">58%</output></span>
              <input id="search-background" class="setting-range" type="range" min="36" max="76" value="58">
            </label>
          </div>
        </section>

      </div>
    </aside>

    <div id="newtab-root" class="newtab-shell" aria-live="polite"></div>
    <script type="module" src="./newtab.ts"></script>
  </body>
</html>
