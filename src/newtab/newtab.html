<!doctype html>
<html lang="zh-CN" class="loading-wallpaper newtab-booting">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator 新标签页</title>
    <style id="instant-wallpaper-startup-style">
      :root {
        color-scheme: dark;
        --bg: #101013;
        --wallpaper-placeholder-bg: #101013;
        --instant-wallpaper-preview-blur: 2px;
        --instant-wallpaper-preview-loading-blur: 2px;
        --instant-wallpaper-preview-loading-opacity: 1;
        --instant-wallpaper-preview-opacity: 1;
        background-color: #101013;
      }

      html,
      body {
        width: 100%;
        min-width: 0;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--wallpaper-placeholder-bg, #101013);
        background-image: var(--instant-wallpaper-preview-image, none);
        background-position: var(--instant-wallpaper-position, center);
        background-repeat: no-repeat;
        background-size: var(--instant-wallpaper-size, cover);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-color: transparent;
        background-image: var(--instant-wallpaper-preview-image, none);
        background-position: var(--instant-wallpaper-position, center);
        background-repeat: no-repeat;
        background-size: var(--instant-wallpaper-size, cover);
        filter: blur(var(--instant-wallpaper-preview-blur, 2px)) saturate(1.02);
        opacity: var(--instant-wallpaper-preview-opacity, 1);
        pointer-events: none;
        transition: opacity 420ms cubic-bezier(0.22, 1, 0.36, 1);
        will-change: opacity;
      }

      html.loading-wallpaper:not(.instant-wallpaper-ready) body::before {
        filter: blur(var(--instant-wallpaper-preview-loading-blur, 2px)) saturate(1.02);
        opacity: var(--instant-wallpaper-preview-loading-opacity, 1);
      }

      html.instant-wallpaper-remote-ready:not([data-instant-wallpaper-preview-only="true"]) body::before {
        opacity: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        body::before {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="newtab-react-root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
