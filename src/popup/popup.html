<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator Bookmark</title>
    <style id="popup-critical-size">
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body,
      #popup-root {
        width: 800px;
        min-width: 800px;
        max-width: 800px;
        height: 600px;
        min-height: 600px;
        max-height: 600px;
        overflow: hidden;
      }

      html,
      body {
        margin: 0;
        background: transparent;
        color-scheme: dark;
      }

      body {
        padding: 0;
      }

      #popup-root {
        position: relative;
        display: block;
        background: #000;
        contain: size layout paint;
        visibility: hidden;
      }

      #popup-root[data-popup-ready="true"] {
        visibility: visible;
      }

      #popup-root > .curator-react-root,
      #popup-app-shell {
        width: 100%;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="popup-root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
