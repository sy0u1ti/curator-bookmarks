<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator Bookmark</title>
    <style id="popup-critical-size">
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body,
      #popup-preboot-shell,
      #popup-root {
        width: 800px;
        min-width: 800px;
        max-width: 800px;
        height: 600px;
        min-height: 600px;
        max-height: 600px;
        overflow: hidden;
      }

      html,
      body {
        margin: 0;
        background: transparent;
        color-scheme: dark;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        padding: 0;
        position: relative;
      }

      #popup-root {
        position: relative;
        z-index: 1;
        display: block;
        background: #000;
        contain: size layout paint;
        visibility: hidden;
      }

      #popup-root[data-popup-ready="true"] {
        visibility: visible;
      }

      #popup-root > .curator-react-root,
      #popup-app-shell {
        width: 100%;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      #popup-preboot-shell {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: block;
        overflow: hidden;
        padding: 45px 14px 0;
        background: #000;
        font-family:
          Geist,
          "Geist Sans",
          "SF Pro Text",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI Variable Text",
          "Segoe UI",
          system-ui,
          "PingFang SC",
          "Microsoft YaHei UI",
          "Microsoft YaHei",
          "Hiragino Sans GB",
          "Helvetica Neue",
          Arial,
          sans-serif;
        font-optical-sizing: auto;
        font-synthesis: none;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      #popup-preboot-shell[hidden],
      #popup-preboot-shell[data-popup-preboot-adopted="true"] {
        display: none;
      }

      .popup-preboot-search {
        display: flex;
        width: 100%;
        height: 40px;
        min-height: 40px;
        align-items: center;
        gap: 6px;
        border: 0;
        border-radius: 6px;
        background: #1f1f1f;
        padding: 0 6px 0 12px;
        color: #ededed;
      }

      .popup-preboot-search:focus-within {
        background: rgba(255, 255, 255, 0.09);
        outline: 3px solid rgba(245, 245, 247, 0.14);
        outline-offset: 0;
      }

      .popup-preboot-search:focus-within .popup-preboot-search-mark {
        color: #a0a0a0;
      }

      .popup-preboot-search-mark {
        display: block;
        width: 16px;
        height: 16px;
        flex: none;
        color: #8f8f8f;
        stroke-width: 2;
      }

      #popup-preboot-search-input {
        width: 100%;
        min-width: 0;
        height: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        padding: 0 2px;
        color: #ededed;
        font-family: inherit;
        font-size: 14px;
        font-style: normal;
        font-variant: normal;
        font-weight: 400;
        line-height: 1.4;
        letter-spacing: normal;
      }

      #popup-preboot-search-input::placeholder {
        color: #8f8f8f;
        opacity: 1;
      }

      .popup-preboot-clear-slot {
        width: 26px;
        height: 26px;
        flex: none;
        visibility: hidden;
      }

      .popup-preboot-semantic {
        display: inline-flex;
        width: 76px;
        min-width: 76px;
        height: 28px;
        flex: none;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        color: #7d7d7d;
        font-size: 12px;
        font-weight: 500;
        line-height: 16px;
        letter-spacing: 0.01em;
        white-space: nowrap;
      }

      @media (prefers-reduced-transparency: reduce) {
        #popup-preboot-shell {
          background: #000;
        }

        .popup-preboot-search {
          background: #1f1f1f;
        }

        .popup-preboot-search:focus-within {
          background: #292929;
        }
      }

      @media (prefers-contrast: more) {
        .popup-preboot-search {
          border: 1px solid rgba(255, 255, 255, 0.52);
          background: #111;
        }

        .popup-preboot-search:focus-within {
          outline-color: #fff;
        }

        .popup-preboot-search-mark,
        .popup-preboot-semantic,
        #popup-preboot-search-input::placeholder {
          color: #c7c7c7;
        }
      }
    </style>
  </head>
  <body>
    <div id="popup-preboot-shell">
      <label class="popup-preboot-search" for="popup-preboot-search-input">
        <svg
          class="popup-preboot-search-mark"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input
          id="popup-preboot-search-input"
          type="text"
          autofocus
          autocomplete="off"
          spellcheck="false"
          placeholder="关键词搜索"
          aria-label="关键词搜索书签标题、网址、标签或高级语法"
        >
        <span class="popup-preboot-clear-slot" aria-hidden="true"></span>
        <span class="popup-preboot-semantic" aria-hidden="true">语义</span>
      </label>
    </div>
    <div id="popup-root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
